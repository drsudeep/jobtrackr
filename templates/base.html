<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTrackr</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            margin:0;
            background:#f5f7fb;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:linear-gradient(
                180deg,
                #0f172a,
                #1e293b
            );
            color:white;
            padding-top:20px;
        }

        .sidebar-brand{
            font-size:24px;
            font-weight:bold;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:14px 25px;
            transition:.3s;
        }

        .sidebar a:hover{
            background:#3b82f6;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .footer{
            margin-left:250px;
            text-align:center;
            padding:20px;
            background:white;
            border-top:1px solid #ddd;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="sidebar-brand">
        JobTrackr
    </div>

    <a href="/">
        <i class="bi bi-house-door"></i>
        Home
    </a>

    <a href="/dashboard/">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="/applications/">
        <i class="bi bi-briefcase"></i>
        Applications
    </a>

    <a href="/add-application/">
        <i class="bi bi-plus-circle"></i>
        Add Application
    </a>

    {% if user.is_authenticated %}

        <a href="#">
            <i class="bi bi-person-circle"></i>
            {{ user.username }}
        </a>

        <a href="/logout/">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    {% else %}

        <a href="/register/">
            <i class="bi bi-person-plus"></i>
            Register
        </a>

        <a href="/login/">
            <i class="bi bi-box-arrow-in-right"></i>
            Login
        </a>

    {% endif %}

</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

<div class="footer">
    JobTrackr © 2026 | Built with Django & Bootstrap
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
