{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

```
<div class="row justify-content-center align-items-center"
     style="min-height:80vh;">

    <div class="col-md-6">

        <div class="card shadow border-0">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Start tracking your job applications today
                    </p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        {{ form.username }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        {{ form.password1 }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        {{ form.password2 }}

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Create Account

                    </button>

                </form>

                <div class="text-center mt-4">

                    <small>

                        Already have an account?

                        <a href="/login/">
                            Login
                        </a>

                    </small>

                </div>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
